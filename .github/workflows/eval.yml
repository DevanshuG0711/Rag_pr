name: Evaluate RAG

on:
  push:
    branches:
      - main

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Bootstrap index for evaluation
        run: |
          python - <<'PY'
          from pathlib import Path

          from app.services.ingest import extract_code_chunks, extract_python_chunks_and_graph
          from app.services.embeddings import generate_embeddings
          from app.services.vector_store import store_chunk_embeddings
          from app.services.call_graph_store import upsert_call_graph

          folder = Path("eval/test_repo")

          if not folder.exists():
              raise FileNotFoundError("Missing test_repo folder")

          for file_path in folder.glob("*.py"):
              file_name = file_path.name
              print(f"Ingesting {file_name}")

              code = file_path.read_text(encoding="utf-8")

              chunks = []
              chunk_metadata = []
              call_graph = {}

              if file_name.endswith(".py"):
                  chunks, chunk_metadata, call_graph = extract_python_chunks_and_graph(
                      code=code,
                      file_name=file_name,
                  )
              else:
                  chunks, chunk_metadata = extract_code_chunks(code=code, file_name=file_name)

              if not chunks:
                  chunks = [code]

              embeddings = generate_embeddings(chunks=chunks)

              store_chunk_embeddings(
                  file_name=file_name,
                  chunks=chunks,
                  embeddings=embeddings,
                  chunk_metadata=chunk_metadata if chunk_metadata else None,
              )

              if call_graph:
                  try:
                      upsert_call_graph(file_name=file_name, call_graph=call_graph)
                  except Exception:
                      print(f"Skipping graph for {file_name}")

          print("Bootstrap indexing completed for all files")
          PY

      - name: Run evaluation
        run: python eval/evaluate_rag.py